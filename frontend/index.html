<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Campus Parking System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; color: #222; }
    header { background: #0b5d67; color: white; padding: 16px 24px; }
    main { max-width: 1000px; margin: auto; padding: 24px; }
    .card { background: white; padding: 16px; margin-bottom: 16px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    input, button { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 12px; }
    button { background: #0b5d67; color: white; border: none; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
  <header>
    <h1>Smart Campus Parking System</h1>
  </header>

  <main>
    <div class="card">
      <h2>Login</h2>
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <button>Login</button>
    </div>

    <div class="card">
      <h2>Available Parking Lots</h2>
      <table>
        <thead>
          <tr>
            <th>Lot</th>
            <th>Location</th>
            <th>Capacity</th>
            <th>Available</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="lotsTableBody">
          <tr>
            <td colspan="5">Loading parking lots...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    async function loadLots() {
      try {
        const response = await fetch('http://localhost:3000/api/lots');
        const lots = await response.json();

        const tableBody = document.getElementById('lotsTableBody');
        tableBody.innerHTML = '';

        lots.forEach(lot => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${lot.name}</td>
            <td>${lot.location}</td>
            <td>${lot.total_capacity}</td>
            <td>${lot.available_spaces}</td>
            <td>${lot.available_spaces > 0 ? 'Open' : 'Full'}</td>
          `;
          tableBody.appendChild(row);
        });
      } catch (error) {
        document.getElementById('lotsTableBody').innerHTML = `
          <tr><td colspan="5">Failed to load parking lots.</td></tr>
        `;
        console.error(error);
      }
    }

    loadLots();
  </script>
</body>
</html>
