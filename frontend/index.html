<script>
const API_BASE_URL = 'http://localhost:3001';

let currentUser = null;

function setCurrentUser(user) {
  currentUser = user;
  const label = document.getElementById('currentUserLabel');
  if (label) {
    label.textContent = user ? `${user.full_name} (${user.role})` : 'None';
  }
}

/* ========= CREATE USER ========= */
async function handleCreateUser(event) {
  event.preventDefault();

  const full_name = document.getElementById('create_full_name').value;
  const email = document.getElementById('create_email').value;
  const password = document.getElementById('create_password').value;
  const role = document.getElementById('create_role').value;

  const msg = document.getElementById('createUserMessage');
  msg.textContent = '';

  try {
    const res = await fetch(`${API_BASE_URL}/api/users/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name, email, password, role })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.error || data.message || 'Failed to create user');
    }

    msg.style.color = 'green';
    msg.textContent = 'User created successfully';
    event.target.reset();
  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = err.message;
  }
}

/* ========= LOGIN ========= */
async function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById('login_email').value;
  const password = document.getElementById('login_password').value;
  const msg = document.getElementById('loginMessage');
  msg.textContent = '';

  try {
    const res = await fetch(`${API_BASE_URL}/api/users/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.message || 'Login failed');
    }

    setCurrentUser(data.user);
    msg.style.color = 'green';
    msg.textContent = 'Login successful';
  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = err.message;
  }
}

/* ========= LOAD LOTS ========= */
async function refreshLots() {
  const tbody = document.getElementById('lotsTableBody');
  const msg = document.getElementById('lotsMessage');
  if (msg) msg.textContent = '';
  if (!tbody) return;

  tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

  try {
    const res = await fetch(`${API_BASE_URL}/api/lots`);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Failed to load lots');
    }

    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5">No lots found.</td></tr>';
    } else {
      tbody.innerHTML = data.map(lot => `
        <tr>
          <td>${lot.lot_name}</td>
          <td>${lot.location}</td>
          <td>${lot.total_capacity}</td>
          <td>${lot.available_spaces}</td>
          <td>${lot.status}</td>
        </tr>
      `).join('');
    }

    // fill select for reservation
    const select = document.getElementById('reserve_lot_id');
    if (select) {
      select.innerHTML = data.map(lot =>
        `<option value="${lot.id}">
          ${lot.lot_name} (${lot.available_spaces}/${lot.total_capacity})
        </option>`
      ).join('');
    }
  } catch (err) {
    tbody.innerHTML = '';
    if (msg) {
      msg.style.color = 'red';
      msg.textContent = err.message;
    }
  }
}

/* ========= LOAD RESERVATIONS ========= */
async function refreshReservations() {
  const tbody = document.getElementById('reservationsTableBody');
  const msg = document.getElementById('reservationsMessage');
  if (msg) msg.textContent = '';
  if (!tbody) return;

  tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

  try {
    const res = await fetch(`${API_BASE_URL}/api/reservations`);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Failed to load reservations');
    }

    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5">No reservations found.</td></tr>';
    } else {
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.user_name}</td>
          <td>${r.lot_name}</td>
          <td>${r.start_time} – ${r.end_time}</td>
          <td>${r.status}</td>
        </tr>
      `).join('');
    }

    // fill cancel select
    const select = document.getElementById('cancel_reservation_id');
    if (select) {
      select.innerHTML = data.map(r =>
        `<option value="${r.id}">
          #${r.id} - ${r.user_name} (${r.status})
        </option>`
      ).join('');
    }
  } catch (err) {
    tbody.innerHTML = '';
    if (msg) {
      msg.style.color = 'red';
      msg.textContent = err.message;
    }
  }
}

/* ========= CREATE RESERVATION ========= */
async function handleCreateReservation(event) {
  event.preventDefault();

  const msg = document.getElementById('reserveMessage');
  msg.textContent = '';

  if (!currentUser) {
    msg.style.color = 'red';
    msg.textContent = 'Please login first';
    return;
  }

  const lot_id = Number(document.getElementById('reserve_lot_id').value);
  const duration = Number(document.getElementById('reserve_duration').value || 30);

  try {
    const res = await fetch(`${API_BASE_URL}/api/reservations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: currentUser.user_id,
        lot_id,
        duration_minutes: duration
      })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.message || data.error || 'Failed to create reservation');
    }

    msg.style.color = 'green';
    msg.textContent = 'Reservation created successfully';

    await refreshReservations();
    await refreshLots();
  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = err.message;
  }
}

/* ========= CANCEL RESERVATION ========= */
async function handleCancelReservation(event) {
  event.preventDefault();

  const msg = document.getElementById('cancelMessage');
  msg.textContent = '';

  const id = document.getElementById('cancel_reservation_id').value;
  if (!id) {
    msg.style.color = 'red';
    msg.textContent = 'Select a reservation first';
    return;
  }

  try {
    const res = await fetch(`${API_BASE_URL}/api/reservations/${id}/cancel`, {
      method: 'PUT'
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.message || data.error || 'Failed to cancel reservation');
    }

    msg.style.color = 'green';
    msg.textContent = 'Reservation cancelled';
    await refreshReservations();
    await refreshLots();
  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = err.message;
  }
}

/* ========= LOAD REPORT SUMMARY ========= */
async function loadReport() {
  const el = document.getElementById('reportSummary');
  if (!el) return;
  el.textContent = 'Loading...';

  try {
    const res = await fetch(`${API_BASE_URL}/api/reports/summary`);
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Failed to load report');
    }

    el.style.color = '';
    el.textContent =
      `Lots: ${data.total_lots}, ` +
      `Users: ${data.total_users}, ` +
      `Reservations: ${data.total_reservations}, ` +
      `Active: ${data.active_reservations}, ` +
      `Cancelled: ${data.cancelled_reservations}`;
  } catch (err) {
    el.style.color = 'red';
    el.textContent = err.message;
  }
}

/* ========= WIRE UP EVERYTHING ========= */
document.addEventListener('DOMContentLoaded', () => {
  const createUserForm = document.getElementById('createUserForm');
  if (createUserForm) {
    createUserForm.addEventListener('submit', handleCreateUser);
  }

  const loginForm = document.getElementById('loginForm');
  if (loginForm) {
    loginForm.addEventListener('submit', handleLogin);
  }

  const reserveForm = document.getElementById('reserveForm');
  if (reserveForm) {
    reserveForm.addEventListener('submit', handleCreateReservation);
  }

  const cancelForm = document.getElementById('cancelForm');
  if (cancelForm) {
    cancelForm.addEventListener('submit', handleCancelReservation);
  }

  const lotsBtn = document.getElementById('refreshLotsBtn');
  if (lotsBtn) lotsBtn.addEventListener('click', refreshLots);

  const resBtn = document.getElementById('refreshReservationsBtn');
  if (resBtn) resBtn.addEventListener('click', refreshReservations);

  const reportBtn = document.getElementById('loadReportBtn');
  if (reportBtn) reportBtn.addEventListener('click', loadReport);

  // initial data load
  refreshLots();
  refreshReservations();
  loadReport();
});
</script>
